name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to release, e.g. v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.npm-pkg }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: linux-x64
            binary: codebase-synapse
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm-pkg: linux-arm64
            binary: codebase-synapse
          - target: x86_64-apple-darwin
            os: macos-latest
            npm-pkg: darwin-x64
            binary: codebase-synapse
          - target: aarch64-apple-darwin
            os: macos-latest
            npm-pkg: darwin-arm64
            binary: codebase-synapse
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm-pkg: win32-x64
            binary: codebase-synapse.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            npm-pkg: win32-arm64
            binary: codebase-synapse.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --no-default-features --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.npm-pkg }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  publish:
    name: Publish to NPM & GitHub Releases
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Resolve version from tag
        run: |
          REF_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION=${REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version resolved: $VERSION"

      - name: Prepare platform packages
        run: |
          declare -A targets
          targets[linux-x64]="x86_64-unknown-linux-gnu"
          targets[linux-arm64]="aarch64-unknown-linux-gnu"
          targets[darwin-x64]="x86_64-apple-darwin"
          targets[darwin-arm64]="aarch64-apple-darwin"
          targets[win32-x64]="x86_64-pc-windows-msvc"
          targets[win32-arm64]="aarch64-pc-windows-msvc"

          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            mkdir -p npm/platform-packages/$pkg
            target="${targets[$pkg]}"
            cp artifacts/binary-$pkg/codebase-synapse npm/platform-packages/$pkg/codebase-synapse-$target
            chmod +x npm/platform-packages/$pkg/codebase-synapse-$target
          done
          for pkg in win32-x64 win32-arm64; do
            mkdir -p npm/platform-packages/$pkg
            target="${targets[$pkg]}"
            cp artifacts/binary-$pkg/codebase-synapse.exe npm/platform-packages/$pkg/codebase-synapse-$target.exe
          done

      - name: Update versions and dependency mappings
        run: node scripts/sync-versions.js $VERSION

      - name: Publish platform packages
        run: |
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64; do
            cd npm/platform-packages/$pkg
            if ! out=$(npm publish --access public 2>&1); then
              if echo "$out" | grep -qE "EPUBLISHCONFLICT|cannot publish over the previously published versions"; then
                echo "Warning: $pkg already published for version $VERSION — skipping"
              else
                echo "$out"
                exit 1
              fi
            else
              echo "$out"
            fi
            cd ../../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          cd npm
          if ! out=$(npm publish --access public 2>&1); then
            if echo "$out" | grep -qE "EPUBLISHCONFLICT|cannot publish over the previously published versions"; then
              echo "Warning: main package already published for version $VERSION — skipping"
            else
              echo "$out"
              exit 1
            fi
          else
            echo "$out"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp artifacts/binary-$pkg/codebase-synapse release-assets/codebase-synapse-$pkg
          done
          for pkg in win32-x64 win32-arm64; do
            cp artifacts/binary-$pkg/codebase-synapse.exe release-assets/codebase-synapse-$pkg.exe
          done
          cd release-assets
          sha256sum * > SHA256SUMS
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
